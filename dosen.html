<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script type="module">
    // 1. IMPORT FIREBASE CDN MODUL
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // 2. CONFIG CONFIGURASI FIREBASE MILIKMU
    const firebaseConfig = {
        apiKey: "AIzaSyCUuXQDLLxX97PDJ1xaCkFPwAARAi2vJ8o",
        authDomain: "qr-presence-f8f14.firebaseapp.com",
        databaseURL: "https://qr-presence-f8f14-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "qr-presence-f8f14",
        storageBucket: "qr-presence-f8f14.firebasestorage.app",
        messagingSenderId: "506287590811",
        appId: "1:506287590811:web:8f180bf07b75dcaa33653e",
        measurementId: "G-R3028BJMYS"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // 3. GENERATE QR CODE KELAS
    const tokenPresensi = "KELAS_A_TEKKOM_UNSOED_2026"; 
    new QRCode(document.getElementById("qrcode"), {
        text: tokenPresensi,
        width: 250,
        height: 250
    });

    // 4. MENDENGAR DATA MASUK DARI INTERNETsecara REAL-TIME
    // Setiap kali database di Firebase berubah, fungsi ini otomatis dijalankan browser laptop
    onValue(ref(db, 'presensi_kelas'), (snapshot) => {
        const data = snapshot.val();
        const tbody = document.getElementById('tabelPresensi');
        const totalHadirTxt = document.getElementById('totalHadir');

        if (!data) {
            totalHadirTxt.innerText = "0";
            tbody.innerHTML = `<tr id="noDataRow"><td colspan="5" class="empty-row">Belum ada mahasiswa yang melakukan presensi.</td></tr>`;
            return;
        }

        // Ubah objek data dari firebase menjadi format list array
        const listHadir = Object.entries(data);
        totalHadirTxt.innerText = listHadir.length;
        tbody.innerHTML = "";

        listHadir.forEach(([keyId, mhs], index) => {
            const row = `
                <tr>
                    <td>${index + 1}</td>
                    <td><strong>${mhs.nim}</strong></td>
                    <td>${mhs.nama}</td>
                    <td>${mhs.waktu}</td>
                    <td>
                        <button class="btn-danger-sm" onclick="hapusBarisCloud('${keyId}', '${mhs.nama}')">Hapus</button>
                    </td>
                </tr>
            `;
            tbody.innerHTML += row;
        });
    });

    // 5. FUNGSI HAPUS SATU BARIS DATA DI CLOUD
    window.hapusBarisCloud = function(keyId, nama) {
        if (confirm(`Apakah Anda yakin ingin menghapus presensi ${nama}?`)) {
            set(ref(db, 'presensi_kelas/' + keyId), null); // Set null artinya menghapus data di Firebase
        }
    }

    // 6. FUNGSI CLEAR SEMUA DATA DI CLOUD
    window.hapusSemuaPresensi = function() {
        if (confirm("Apakah Anda yakin ingin mengosongkan seluruh daftar hadir di cloud server?")) {
            set(ref(db, 'presensi_kelas'), null); // Hapus seluruh cabang tabel
        }
    }
</script>
